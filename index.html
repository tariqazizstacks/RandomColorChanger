    function changeColor(){
        let red=Math.ceil(Math.random()*255);

        document.body.style.backgroundColor=`rgb(${red} ${green} ${blue})`;

    btn.addEventListener("click",changeColor);
    btn.addEventListener("touchstart",changeColor);
